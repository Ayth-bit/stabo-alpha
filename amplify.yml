version: 1
frontend:
  phases:
    preBuild:
      commands:
        # キャッシュのクリア
        - rm -rf node_modules
        - rm -rf .next
        # 基本的な依存関係のインストール
        - npm install
        # TypeScript関連のパッケージを明示的にインストール
        - npm install --save-dev typescript @types/node @types/react @types/react-dom
        # UI関連のパッケージをインストール
        - npm install class-variance-authority @radix-ui/react-label clsx tailwind-merge @hookform/resolvers @radix-ui/react-slot react-hook-form zod
        # Prismaの生成
        - npx prisma generate
        # TypeScriptの設定を確認
        - npx tsc --version
    build:
      commands:
        - echo "NODE_ENV=$NODE_ENV"
        - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains'
        - key: 'X-Frame-Options'
          value: 'SAMEORIGIN'
        - key: 'X-XSS-Protection'
          value: '1; mode=block' 