version: 1
frontend:
  phases:
    preBuild:
      commands:
        # 既存のnode_modulesを削除
        - rm -rf node_modules
        # 必要なパッケージをインストール
        - npm install
        - npm install class-variance-authority @radix-ui/react-label clsx tailwind-merge
        # Prismaの生成
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/* 