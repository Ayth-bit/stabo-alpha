version: 1
frontend:
  phases:
    preBuild:
      commands:
        # 環境のクリーンアップ
        - rm -rf node_modules
        - rm -rf .next
        # 依存関係のインストール
        - npm install
        # TypeScriptの確認
        - echo "TypeScript version:"
        - npx tsc --version
        # Prisma生成
        - npx prisma generate
    build:
      commands:
        # 環境変数の確認
        - node -e "console.log('NODE_ENV:', process.env.NODE_ENV)"
        # ビルド実行
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains'
        - key: 'X-Frame-Options'
          value: 'SAMEORIGIN'
        - key: 'X-XSS-Protection'
          value: '1; mode=block' 